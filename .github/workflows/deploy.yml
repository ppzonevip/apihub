name: Deploy to CloudBase + Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build for Vercel (SSR mode)
        run: |
          node -e "
const fs = require('fs');
let c = fs.readFileSync('apps/console/next.config.js', 'utf8');
c = c.replace(/output:\s*['\"]export['\"],?\s*/g, '');
c = c.replace(/images:\s*\{[^}]*unoptimized:\s*true[^}]*\},\s*/g, '');
fs.writeFileSync('apps/console/next.config.js', c);
"
          npm run build
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Vercel App
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-cloudbase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build static export for CloudBase
        run: |
          cd apps/console
          node -e "
const fs = require('fs');
let c = fs.readFileSync('next.config.js', 'utf8');
if (!c.includes('output')) {
  c = c.replace('const nextConfig = {', 'const nextConfig = {\n  output: \"export\",\n  images: { unoptimized: true },');
  fs.writeFileSync('next.config.js', c);
}
"
          npx next build
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli
      - name: Deploy to Tencent CloudBase
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          TENCENT_ENV_ID: ${{ secrets.TENCENT_ENV_ID }}
        run: |
          tcb login --apiKeyId "$TENCENT_SECRET_ID" --apiKey "$TENCENT_SECRET_KEY"
          tcb hosting deploy -e "$TENCENT_ENV_ID" ./out/
